{% for cmd in commands %}
<div class="flex items-start gap-2 p-2 rounded-lg bg-slate-50 text-xs">
  <span class="shrink-0 w-3 h-3 rounded-full mt-0.5
    {% if cmd.status == 'done' %}bg-green-500
    {% elif cmd.status == 'failed' %}bg-red-500
    {% elif cmd.status == 'dispatched' %}bg-yellow-500
    {% else %}bg-slate-300{% endif %}">
  </span>
  <div class="min-w-0 flex-1">
    <p class="font-medium text-slate-700">{{ cmd.action }}</p>
    <p class="text-slate-400">{{ cmd.status }} · {{ (cmd.created_at or '')[:16] }}</p>
    {% if cmd.result %}
    <p class="text-slate-500 font-mono truncate">{{ cmd.result | string | truncate(80) }}</p>
    {% endif %}
  </div>
</div>
{% else %}
<p class="text-xs text-slate-400 text-center py-4">ยังไม่มี command</p>
{% endfor %}
